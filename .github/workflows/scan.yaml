name: Proxy Scanner

on:
  workflow_dispatch: # 支持手动点击运行
  schedule:
    - cron: "0 */6 * * *" # 每 6 小时自动运行一次

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🟢 安装 Bun 环境
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: 📦 安装依赖
        run: bun install

      - name: 🔍 执行扫描脚本
        run: bun run ./helper/proxyip.ts
        env:
          # 如果你的脚本需要特定环境变量可以加在这里

      - name: 📝 提交更新到 GitHub
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Action"
          git add proxyList.txt kvProxyList.json
          git commit -m "自动更新代理列表: $(date)" || exit 0
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GIT_TOKEN }}

      - name: 🚀 同步到 FTP 空间
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          local-dir: ./
          # 注意：这里只上传 proxyList.txt，防止覆盖你 FTP 里的其他重要文件
          server-dir: /htdocs/vless/
          exclude: |
            **
            !proxyList.txt
            !kvProxyList.json
